<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .logo {
            display: block;
            margin: 0 auto 15px;
            width: 100px;
            height: 100px;
        }

        h2 {
            text-align: center;
            color: #003366;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- College Logo -->
    <img src="klncelogo.png" alt="College Logo" class="logo">

    <h2>Student Information Form</h2>

    <form>

        <label>First Name:</label>
        <input type="text" name="firstname" required>

        <label>Last Name:</label>
        <input type="text" name="lastname" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Father's Name:</label>
        <input type="text" name="fathername" required>

        <label>Mother's Name:</label>
        <input type="text" name="mothername" required>

        <label>Age:</label>
        <input type="number" name="age" min="1" max="100" required>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
