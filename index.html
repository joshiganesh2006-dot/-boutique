<!DOCTYPE html>
<html>
<head>
<title>KLN College Login</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}
.container{
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px gray;
}
input{
    width:90%;
    padding:10px;
    margin:10px 0;
}
button{
    width:95%;
    padding:10px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:5px;
}
img{
    width:80px;
}
</style>
</head>

<body>

<div class="container">

<img src="images.jpg" alt="KLN Logo">

<h2>KLN College Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button>Submit</button>

</div>

</body>
</html>
